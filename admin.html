<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Console · IDB Assets Dashboard</title>
    <link rel="icon" type="image/jpeg" href="images/favicon.jpg?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="auth.css?v=20260530a">
</head>

<body>
    <!-- Access gate (shown while verifying / when denied) -->
    <div id="gate" class="auth-wrap">
        <div class="auth-card" style="text-align:center">
            <div class="auth-brand">
                <img src="images/ie-logo.png?v=20260405c" alt="IE Logo" onerror="this.style.display='none'">
                <h1>Admin Console</h1>
            </div>
            <p id="gateMsg" class="muted"><span class="spin"></span> &nbsp;Verifying access…</p>
            <div id="gateActions" style="display:none;margin-top:1rem">
                <a class="btn btn-primary" href="login.html?next=admin.html">Go to Login</a>
            </div>
        </div>
    </div>

    <!-- Admin app (revealed after an admin is verified) -->
    <div id="app" class="admin-page" style="display:none">
        <div class="admin-top">
            <div>
                <h1>🛡️ Admin Console</h1>
                <div class="who" id="who"></div>
            </div>
            <div class="admin-actions">
                <a class="btn btn-ghost btn-sm" href="index.html">📊 Dashboard</a>
                <button class="btn btn-danger btn-sm" id="logoutBtn">Logout</button>
            </div>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="n" id="statUsers">–</div>
                <div class="l">Total Users</div>
            </div>
            <div class="stat">
                <div class="n" id="statAdmins">–</div>
                <div class="l">Admins</div>
            </div>
            <div class="stat">
                <div class="n" id="statViewers">–</div>
                <div class="l">Viewers</div>
            </div>
            <div class="stat">
                <div class="n" id="statLogins">–</div>
                <div class="l">Logins (24h)</div>
            </div>
        </div>

        <!-- Users -->
        <div class="panel">
            <div class="panel-head">
                <h2>👥 User Management</h2>
                <div style="display:flex;gap:.6rem;align-items:center">
                    <input class="search" id="userSearch" placeholder="Search users…">
                    <button class="btn btn-ghost btn-sm" id="refreshUsers">↻ Refresh</button>
                </div>
            </div>
            <div class="panel-body">
                <table>
                    <thead>
                        <tr>
                            <th>User</th>
                            <th>Role</th>
                            <th>Joined</th>
                            <th>Last Login</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="usersBody">
                        <tr>
                            <td colspan="5" class="empty"><span class="spin"></span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Audit trail -->
        <div class="panel">
            <div class="panel-head">
                <h2>📜 Login Audit Trail</h2>
                <div style="display:flex;gap:.6rem;align-items:center">
                    <input class="search" id="auditSearch" placeholder="Search audit…">
                    <button class="btn btn-ghost btn-sm" id="refreshAudit">↻ Refresh</button>
                </div>
            </div>
            <div class="panel-body">
                <table>
                    <thead>
                        <tr>
                            <th>When</th>
                            <th>User</th>
                            <th>Event</th>
                            <th>IP Address</th>
                            <th>Location</th>
                            <th>Device / Browser</th>
                            <th>Duration</th>
                        </tr>
                    </thead>
                    <tbody id="auditBody">
                        <tr>
                            <td colspan="7" class="empty"><span class="spin"></span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0/dist/umd/supabase.min.js"></script>
    <script src="supabase-client.js?v=20260530a"></script>
    <script src="auth-footprint.js?v=20260530b"></script>
    <script src="admin.js?v=20260530a"></script>
</body>

</html>
